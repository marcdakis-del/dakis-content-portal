<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Portal — Dakis Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dc;
    --border-strong: #ccc9bf;
    --text: #1a1a18;
    --muted: #6b6960;
    --hint: #a8a49b;
    --accent: #d4621a;
    --accent-light: #fdf0e8;
    --accent-border: #e8a070;
    --success-bg: #edf6ec;
    --success-text: #2d6a30;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 560px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .wordmark-dot {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 50%;
  }

  .wordmark-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .wordmark-text span { color: var(--accent); }

  header h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 1rem;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  label { font-size: 12px; color: var(--muted); font-weight: 500; }

  input[type="text"], select, textarea {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: #fff;
  }

  textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .type-btn {
    padding: 10px 6px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.3;
  }

  .type-btn svg { display: block; margin: 0 auto 5px; width: 18px; height: 18px; }

  .type-btn:hover { border-color: var(--border-strong); color: var(--text); }

  .type-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .tone-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0; }

  .tone-pill {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tone-pill:hover { border-color: var(--border-strong); color: var(--text); }

  .tone-pill.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  .generate-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 1.25rem;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }

  .generate-btn:hover { opacity: 0.92; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 1rem;
    display: none;
  }

  .output-card.visible { display: block; }

  .output-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--success-bg);
    color: var(--success-text);
    margin-bottom: 10px;
  }

  .output-meta {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 12px;
  }

  .output-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 12px;
  }

  .output-actions { display: flex; gap: 8px; }

  .action-btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }

  .action-btn:hover { border-color: var(--border-strong); color: var(--text); }

  .error-msg {
    font-size: 13px;
    color: #c0392b;
    padding: 10px 14px;
    background: #fdf0ee;
    border: 1px solid #f5c6c0;
    border-radius: var(--radius-sm);
    margin-top: 1rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-gap { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--hint);
  }

  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 480px) {
    .row { grid-template-columns: 1fr; }
    .type-grid { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="wordmark">
      <div class="wordmark-dot"></div>
      <span class="wordmark-text">Dakis <span>Studio</span></span>
    </div>
    <h1>Content portal</h1>
    <p>Fill in your details and get ready-to-post social content in seconds — powered by AI.</p>
  </header>

  <div class="card">
    <p class="card-label">Your business</p>
    <div class="row">
      <div class="field">
        <label for="bname">Business name</label>
        <input type="text" id="bname" placeholder="e.g. The Copper Kettle"/>
      </div>
      <div class="field">
        <label for="btype">Type of business</label>
        <select id="btype">
          <option value="">Select...</option>
          <option>Café / coffee shop</option>
          <option>Restaurant</option>
          <option>Personal trainer</option>
          <option>Hair / beauty salon</option>
          <option>Barbershop</option>
          <option>Tradesperson</option>
          <option>Retail shop</option>
          <option>Gym / fitness studio</option>
          <option>Pub / bar</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="promo">What do you want to promote this week?</label>
      <textarea id="promo" placeholder="e.g. New lunch menu — 3 courses for £12, Monday to Friday until end of June. Great for office workers nearby."></textarea>
    </div>
  </div>

  <div class="card">
    <p class="card-label">Content type</p>
    <div class="type-grid">

      <button class="type-btn active" data-type="Instagram caption" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </button>

      <button class="type-btn" data-type="Facebook post" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
        </svg>
        Facebook
      </button>

      <button class="type-btn" data-type="Google Business update" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        Google update
      </button>

      <button class="type-btn" data-type="TikTok video script" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12a4 4 0 104 4V4a5 5 0 005 5"/>
        </svg>
        TikTok script
      </button>

      <button class="type-btn" data-type="email newsletter intro" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        Email intro
      </button>

      <button class="type-btn" data-type="SMS text message" onclick="setType(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        SMS
      </button>

    </div>

    <div class="section-gap">
      <p class="card-label" style="margin-bottom:0.75rem">Tone</p>
      <div class="tone-row">
        <button class="tone-pill active" data-tone="friendly and warm" onclick="setTone(this)">Friendly</button>
        <button class="tone-pill" data-tone="professional and polished" onclick="setTone(this)">Professional</button>
        <button class="tone-pill" data-tone="fun and playful" onclick="setTone(this)">Playful</button>
        <button class="tone-pill" data-tone="urgent and exciting" onclick="setTone(this)">Urgent</button>
        <button class="tone-pill" data-tone="local and community-focused" onclick="setTone(this)">Local feel</button>
      </div>
    </div>

    <button class="generate-btn" id="gbtn" onclick="generate()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Generate content
    </button>
  </div>

  <div class="error-msg" id="errmsg"></div>

  <div class="output-card" id="outcard">
    <div class="output-badge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Ready to post
    </div>
    <p class="output-meta" id="outmeta"></p>
    <div class="output-text" id="outtext"></div>
    <div class="output-actions">
      <button class="action-btn" id="copybtn" onclick="copyText()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="action-btn" onclick="generate()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Regenerate
      </button>
    </div>
  </div>

  <footer>
    <p>Powered by <a href="https://dakisstudio.com" target="_blank">Dakis Studio</a> &amp; AI</p>
  </footer>

</div>

<script>
  let ctype = 'Instagram caption';
  let ctone = 'friendly and warm';
  let lastText = '';

  function setType(el) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    ctype = el.dataset.type;
  }

  function setTone(el) {
    document.querySelectorAll('.tone-pill').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    ctone = el.dataset.tone;
  }

  function showError(msg) {
    const el = document.getElementById('errmsg');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 5000);
  }

  function copyText() {
    navigator.clipboard.writeText(lastText).then(() => {
      const btn = document.getElementById('copybtn');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
      }, 2000);
    });
  }

  async function generate() {
    const name = document.getElementById('bname').value.trim();
    const type = document.getElementById('btype').value;
    const promo = document.getElementById('promo').value.trim();

    if (!name || !type || !promo) {
      showError('Please fill in your business name, type, and what you want to promote.');
      return;
    }

    const btn = document.getElementById('gbtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Writing...';
    document.getElementById('outcard').classList.remove('visible');

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ businessName: name, businessType: type, promotion: promo, contentType: ctype, tone: ctone })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || 'Something went wrong. Please try again.');
        return;
      }

      lastText = data.content;
      document.getElementById('outtext').textContent = data.content;
      document.getElementById('outmeta').textContent = `${ctype} — ${ctone} tone`;
      document.getElementById('outcard').classList.add('visible');

    } catch (e) {
      showError('Connection error. Please check your internet and try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generate content`;
    }
  }
</script>
</body>
</html>
